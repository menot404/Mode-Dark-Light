<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="./index.js" type="module"></script>
    <link rel="stylesheet" href="index.css">
    <title>Mode Light and Dark</title>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Thème Personnalisable</h1>
            <label for="" class="theme-switch">
                <input type="checkbox" name="theme-toggle" id="theme-toggle">
                <span class="slider"></span>
            </label>
        </div>
        <div class="card">
            <h2>Exemple de Carte</h2>
            <p>Ceci est un exemple de contenu avec une transition fluide entre les thèmes.</p>
            <button>Test</button>
        </div>
        <div class="card">
            <h2>Fonctionnalités</h2>
            <ul>
                <li>Transition douce entre les thèmes</li>
                <li>Sauvegarde dans le navigateur</li>
                <li>Design responsive</li>
                <li>Compatibilité avec les préférences système</li>
            </ul>
        </div>
    </div>
</body>
</html>
